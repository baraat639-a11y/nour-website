
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe4e1;
            font-family: sans-serif;
            text-align: center;
            overflow: hidden;
        }
        .container { width: 100%; position: relative; }
        h1 { color: #d63384; margin-bottom: 30px; }
        .heart { font-size: 80px; }
        
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100; /* لضمان بقاء الأزرار في المقدمة */
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: relative; /* سيتغير إلى absolute بواسطة JS عند اللمس */
        }

        .celebration { display: none; }
        .celebration h1 { font-size: 3rem; color: #ff4d6d; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="heart">❤️</div>
        <h1>Nour, will you be my valentine?</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">No</button>
        </div>
    </div>

    <div id="celebration" class="celebration">
        <div class="heart">💖✨</div>
        <h1>YAY! 🎉</h1>
        <h1>I knew you'd say YES! 🥰</h1>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            // تحويل الزر إلى وضع الحرية في الحركة فور لمسه
            noBtn.style.position = 'absolute';
            
            // حساب مكان عشوائي بعيداً عن زر Yes
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function celebrate() {
            // إخفاء السؤال وإظهار الاحتفال
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('celebration').style.display = 'block';
        }
    </script>
</body>
</html>
